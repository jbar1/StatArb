<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pair Trading — Z-Score Charts</title>
  <meta name="description" content="Interactive z-score charts for statistical arbitrage pair trading." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #ccc;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      background: linear-gradient(135deg, #141425 0%, #1a1a35 100%);
      border-bottom: 1px solid #2e2e4e;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e0e0ff;
      letter-spacing: 0.02em;
    }
    .badge {
      background: #4C9BE8;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .meta {
      margin-left: auto;
      font-size: 0.78rem;
      color: #666;
    }

    /* ── grid ── */
    main {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 680px), 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    /* ── card ── */
    .card {
      background: #141425;
      border: 1px solid #2e2e4e;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: #4C9BE8;
      box-shadow: 0 0 0 1px #4C9BE822, 0 8px 32px #00000066;
    }

    .card-header {
      padding: 0.75rem 1rem;
      background: #1a1a2e;
      border-bottom: 1px solid #2e2e4e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .pair-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0e0ff;
      flex: 1;
    }
    .ts-badge {
      font-size: 0.68rem;
      color: #666;
      white-space: nowrap;
    }
    .open-link {
      font-size: 0.72rem;
      color: #4C9BE8;
      text-decoration: none;
      padding: 0.2rem 0.5rem;
      border: 1px solid #4C9BE844;
      border-radius: 5px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .open-link:hover { background: #4C9BE822; }

    iframe {
      width: calc(100% + 16px);   /* expand slightly left/right */
      height: 440px;              /* more room for bottom area */
      border: none;
      display: block;
      background: #1a1a2e;
      margin-left: -8px;          /* shift chart left */
      margin-top: 6px;            /* shift chart slightly downward */
      margin-bottom: -10px;       /* allow chart bottom to extend */
    }

    /* ── footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: #444;
      border-top: 1px solid #2e2e4e;
    }
  </style>
</head>
<body>
  <header>

      </div>
      <iframe src="charts/zscore_MZW_MZS.html" loading="lazy" title="MZW / MZS"></iframe>
    </div>
    <div class="card">

      </div>
      <iframe src="charts/zscore_MES_MCL.html" loading="lazy" title="MES / MCL"></iframe>
    </div>
    <div class="card">

      </div>
      <iframe src="charts/zscore_MES_MMC.html" loading="lazy" title="MES / MMC"></iframe>

  </main>

  <footer>
    Auto-generated by GitHubChartUploader &bull; 2026-03-18 17:00 CET
  </footer>
</body>
</html>
