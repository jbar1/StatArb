  function axisInfo(ax) {
    if (!ax || ax._length == null) return null;

  // present (known Plotly limitation — the rangeslider takes ownership of
  // horizontal drag for xaxis, so Plotly ignores yaxis during left-drag).

  // relayout, while letting Plotly handle X pan natively.
