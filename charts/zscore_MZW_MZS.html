    if (!_rafY) { _rafY = true; requestAnimationFrame(applyYPan); }
  }, true);

  window.addEventListener('mouseup', function (e) {
    if (e.button !== 0) return;
    _lmbDown = false;
  }, true);

  /* ── Middle-mouse-button → temporary zoom-box mode ──────────────────── */
  //
  // Strategy: switch dragmode to 'zoom' BEFORE the browser delivers the
  // mousedown to Plotly (capture phase), so Plotly sees it in zoom mode and
  // draws its native blue selection rectangle.  We must NOT stopPropagation
  // — Plotly needs to receive the original event to start its drag handler.
  // On mouseup we restore 'pan'.

  gd.addEventListener('mousedown', function (e) {
    if (e.button !== 1) return;   // only middle button
    e.preventDefault();           // suppress browser auto-scroll cursor
    // Do NOT stopPropagation — Plotly must also receive this event

    Plotly.relayout(gd, { dragmode: 'zoom' });

    function onMouseUp(evt) {
      if (evt.button !== 1) return;
      Plotly.relayout(gd, { dragmode: 'pan' });
      window.removeEventListener('mouseup', onMouseUp, true);
    }
    window.addEventListener('mouseup', onMouseUp, true);
  }, true);   // capture phase — runs before Plotly's own listener

  /* ── suppress browser middle-click scroll popup ──────────────────────── */
  gd.addEventListener('auxclick',    function (e) { if (e.button === 1) e.preventDefault(); });
  gd.addEventListener('contextmenu', function (e) { if (e.button === 1) e.preventDefault(); });

  /* ── scroll-wheel axis zoom ──────────────────────────────────────────── */
  //
  // Activation zones:
  //   Inside plot area       → zoom BOTH axes, anchored on the cursor position
  //   Bottom margin          → zoom X axis only, anchored on axis midpoint
  //   Left / Right margins   → zoom Y axis only, anchored on axis midpoint
  //   Corners                → ignored

  var ZOOM_STEP = 0.15;

  function zoomAxisAround(ax, focus, factor) {
    var info = axisInfo(ax);
    if (!info) return null;
    var newR0 = focus - (focus - info.r0) * factor;
    var newR1 = focus + (info.r1 - focus) * factor;
    return [ax.l2r(newR0), ax.l2r(newR1)];
  }

  function zoomAxisMid(ax, factor) {
    var info = axisInfo(ax);
    if (!info) return null;
    var mid  = (info.r0 + info.r1) / 2;
    var half = (info.r1 - info.r0) / 2 * factor;
    return [ax.l2r(mid - half), ax.l2r(mid + half)];
  }

  gd.addEventListener('wheel', function (e) {
    var fl = gd._fullLayout;
    if (!fl) return;

    var rect   = gd.getBoundingClientRect();
    var mouseX = e.clientX - rect.left;
    var mouseY = e.clientY - rect.top;

    var xa = fl.xaxis;
    var ya = fl.yaxis;

    var plotLeft   = xa ? (xa._offset || 0)                         : 0;
    var plotRight  = xa ? (plotLeft  + (xa._length || rect.width))  : rect.width;
    var plotTop    = ya ? (ya._offset || 0)                         : 0;
    var plotBottom = ya ? (plotTop   + (ya._length || rect.height)) : rect.height;

    var inPlotH = (mouseX >= plotLeft && mouseX <= plotRight);
    var inPlotV = (mouseY >= plotTop  && mouseY <= plotBottom);

    var zone;
    if (inPlotH && inPlotV) {
      zone = 'both';
    } else if (!inPlotV && inPlotH) {
      zone = 'x';
    } else if (!inPlotH && inPlotV) {
      zone = 'y';
    } else {
      return;
    }

    e.preventDefault();
    e.stopPropagation();

    var factor = e.deltaY > 0 ? (1 + ZOOM_STEP) : (1 - ZOOM_STEP);
    var update = {};

    if (zone === 'both' || zone === 'x') {
      if (xa) {
        var xi = axisInfo(xa);
        if (xi) {
          var xr;
          if (zone === 'both') {
            var xFrac  = (mouseX - plotLeft) / xa._length;
            var xFocus = xi.r0 + xFrac * (xi.r1 - xi.r0);
            xr = zoomAxisAround(xa, xFocus, factor);
          } else {
            xr = zoomAxisMid(xa, factor);
          }
          if (xr) { update['xaxis.range[0]'] = xr[0]; update['xaxis.range[1]'] = xr[1]; }
        }
      }
    }

    if (zone === 'both' || zone === 'y') {
      if (ya) {
        var yi = axisInfo(ya);
        if (yi) {
          var yr;
          if (zone === 'both') {
            var yFrac  = 1 - (mouseY - plotTop) / ya._length;
            var yFocus = yi.r0 + yFrac * (yi.r1 - yi.r0);
            yr = zoomAxisAround(ya, yFocus, factor);
          } else {
            yr = zoomAxisMid(ya, factor);
          }
          if (yr) { update['yaxis.range[0]'] = yr[0]; update['yaxis.range[1]'] = yr[1]; }
        }
      }
    }

    if (Object.keys(update).length) Plotly.relayout(gd, update);

  }, { passive: false });

})();

                        })                };            </script>        </div>
