  var gd = document.querySelector('.plotly-graph-div');

  /* ── shared axis helper ──────────────────────────────────────────────── */

  function axisInfo(ax) {
    if (!ax || ax._length == null) return null;
    var r0 = ax._rl0 != null ? ax._rl0 : ax.r2l(ax.range[0]);
    var r1 = ax._rl1 != null ? ax._rl1 : ax.r2l(ax.range[1]);

  // present (known Plotly limitation — the rangeslider takes ownership of
  // horizontal drag for xaxis, so Plotly ignores yaxis during left-drag).
  // We track left-drag delta-Y ourselves and apply Y-axis shifts via
  // relayout, while letting Plotly handle X pan natively.

  var _lastY    = 0;
  var _rafY     = false;
  var _pendingY = 0;

    _rafY = false;
    if (!_lmbDown || _pendingY === 0) return;
    var fl = gd._fullLayout;

    if (!yi || yi.length === 0) return;

    var fl = gd._fullLayout;
